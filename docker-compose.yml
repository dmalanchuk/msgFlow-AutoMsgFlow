version: "3.9"

services:
  gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    env_file:
      - ./api_gateway/.env
    depends_on:
      - api1
      - api2
      - api3
      - nginx
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  api1:
    build: ./workflow_service
    container_name: workflow_service_first
    env_file:
      - ./workflow_service/.env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8003 --workers 2
    restart: unless-stopped

  api2:
    build: ./workflow_service
    container_name: workflow_service_second
    env_file:
      - ./workflow_service/.env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8004 --workers 2
    restart: unless-stopped

  api3:
    build: ./workflow_service
    container_name: workflow_service_third
    env_file:
      - ./workflow_service/.env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8005 --workers 2
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - api3
    restart: unless-stopped
