  auth_service:
    container_name: auth_service_container
    build: ./auth_service
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  integration_service:
    container_name: integration_service_container
    build: ./integration_service
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
      - db
    restart: unless-stopped

  workflow_service:
    container_name: workflow_service_container
    build: ./workflow_service
    ports:
      - "8003:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
      - db
    restart: unless-stopped

  api_gateway:
    container_name: api_gateway_container
    build: ./api_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - auth_service
      - integration_service
      - workflow_service
    restart: unless-stopped

