#    env_file:
#      - ./workflow_service/.env
#    depends_on:
#      - postgres_workflow
#    command: uvicorn src.main:app --host 0.0.0.0 --port 8005 --workers 2
#    restart: unless-stopped

  auth:
    build: ./auth_service
    container_name: auth_service
    env_file:
      - ./auth_service/.env
    depends_on:
      - postgres_auth
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --workers 2
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  postgres_auth:
    image: postgres:17
    container_name: postgres_auth
    restart: unless-stopped
    env_file:
      - ./auth_service/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data

  postgres_workflow:
    image: postgres:17
    container_name: postgres_workflow
    restart: unless-stopped
    env_file:
      - ./workflow_service/.env
    ports:
      - "5433:5432"
    volumes:
      - pgdata_workflow:/var/lib/postgresql/data

volumes:
  pgdata_auth:
  pgdata_workflow:
