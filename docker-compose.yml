services:
  auth_service:
    build: ./auth_service
    ports:
      - "8001:8000"
    restart: unless-stopped

  integration_service:
    build: ./integration_service
    ports:
      - "8002:8000"
    restart: unless-stopped

  workflow_service:
    build: ./workflow_service
    ports:
      - "8003:8000"
    restart: unless-stopped

  api_gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth_service
      - integration_service
      - workflow_service
    restart: unless-stopped
