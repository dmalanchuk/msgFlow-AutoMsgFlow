services:
  gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    env_file:
      - ./api_gateway/.env
    depends_on:
      - workflow
      - auth
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  workflow:
    build: ./workflow_service
    container_name: workflow_service
    env_file:
      - ./workflow_service/.env
    depends_on:
      - postgres_workflow
    command: uvicorn src.main:app --host 0.0.0.0 --port 8003 --workers 2
    restart: unless-stopped

